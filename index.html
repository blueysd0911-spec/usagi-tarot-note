<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>タロットうさぎの占い屋さん 🐰🍓</title>
    <style>
        :root {
            --primary-color: #ffb7c5; /* さくらピンク */
            --accent-color: #ff8fa3;  /* いちごピンク */
            --bg-color: #fff5f6;      /* ほんのりピンクのミルク色 */
            --card-bg: #ffffff;
            --text-color: #5d4f52;    /* 優しいココアブラウン */
            --bunny-ears: #ffd0d6;    /* 耳のなかみのピンク */
        }
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        /* ウサギといちごのヘッダー */
        .bunny-header {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
            padding-top: 20px;
        }
        h1 {
            color: var(--accent-color);
            font-size: 32px;
            margin: 10px 0 5px 0;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
        }
        .subtitle {
            font-size: 14px;
            color: #a38a8e;
            margin: 0;
        }
        
        h2 {
            color: var(--accent-color);
            border-bottom: 2px dashed var(--primary-color);
            padding-bottom: 8px;
            margin-top: 0;
            font-size: 18px;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 900px) {
            .grid { grid-template-columns: 1fr; }
        }
        .card-box {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 24px;
            box-shadow: 0 8px 20px rgba(255, 183, 197, 0.25);
            margin-bottom: 25px;
            border: 2px solid #ffe3e7;
            position: relative;
            overflow: hidden;
        }
        .card-box::before {
            content: "🍓";
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 20px;
            opacity: 0.3;
        }
        label {
            display: block;
            margin-top: 12px;
            font-weight: bold;
            font-size: 14px;
            color: #7d666a;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border: 2px solid #ffd0d6;
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 14px;
            background-color: #fffcfd;
            color: var(--text-color);
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(255, 143, 163, 0.2);
        }
        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 14px 24px;
            margin-top: 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            box-shadow: 0 4px 12px rgba(255, 143, 163, 0.4);
            transition: all 0.3s ease;
        }
        button:hover {
            background-color: #ff758f;
            transform: translateY(-1px);
            box-shadow: 0 6px 15px rgba(255, 117, 143, 0.5);
        }
        .log-item {
            border-left: 6px solid var(--accent-color);
            padding: 15px;
            margin-bottom: 15px;
            background: #ffffff;
            border-radius: 4px 18px 18px 4px;
            box-shadow: 0 4px 10px rgba(255, 183, 197, 0.15);
            border: 1px solid #ffeef1;
            position: relative; /* 削除ボタンの配置用 */
        }
        
        /* ❌ 削除ボタンの可愛いスタイリング */
        .delete-btn {
            background: none;
            border: none;
            color: #ccc;
            font-size: 16px;
            cursor: pointer;
            padding: 5px;
            position: absolute;
            top: 12px;
            right: 15px;
            width: auto;
            box-shadow: none;
            margin-top: 0;
            transition: color 0.2s ease, transform 0.2s ease;
        }
        .delete-btn:hover {
            background: none;
            color: #ff4d6d;
            box-shadow: none;
            transform: scale(1.15);
        }

        .badge {
            background: var(--primary-color);
            color: #7d3c47;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-left: 5px;
        }
        .dic-output {
            margin-top: 15px;
            padding: 15px;
            background: #fff9fa;
            border-radius: 14px;
            border: 2px dashed var(--accent-color);
            font-size: 14px;
            color: var(--text-color);
            line-height: 1.7;
        }
        .log-grid {
            display: grid;
            grid-template-columns: 140px 1fr;
            gap: 8px 10px;
            margin-top: 10px;
            font-size: 14px;
        }
        .log-label { font-weight: bold; color: #a38a8e; }
        
        .card-name-block {
            margin-top: 8px;
        }
        .history-card-list {
            margin: 0;
            padding-left: 18px;
            color: #e0536c;
            font-weight: bold;
        }
        .bunny-separator {
            text-align: center;
            color: var(--primary-color);
            font-size: 18px;
            margin: 10px 0;
        }
        
    </style>
</head>
<body>

<div class="container">
    <div class="bunny-header">
        <span style="font-size: 40px;">🐰🍓🔮</span>
        <h1>タロットうさぎの占い屋さん</h1>

    </div>

    <div class="grid">
        <div>

                            <label>📅 占った日付</label>
                            <input type="date" id="date" required>
                        </div>
                        <div>
                            <label>🍓 相談ジャンル</label>
                            <select id="genre">
                                <option value="仕事">仕事</option>
                                <option value="恋愛">恋愛</option>
                                <option value="人間関係">人間関係</option>
                                <option value="人生">人生</option>
                            </select>
                        </div>
                    </div>

                    <label>📐 スプレッド（展開法）</label>
                    <select id="spread" onchange="updateCardInputs()">
                        <option value="ワンオラクル">ワンオラクル（1枚）</option>
                        <option value="シンプルクロス">シンプルクロス（2枚）</option>
                        <option value="スリーカード">スリーカード（3枚）</option>
                        <option value="ダイヤモンドクロス">ダイヤモンドクロス（4枚）</option>
                        <option value="二者択一">二者択一（5枚）</option>
                        <option value="ヘキサグラム">ヘキサグラム（7枚）</option>
                        <option value="ケルト十字">ケルト十字（10枚）</option>
                    </select>

                    <label>💬 相談内容（詳細）</label>
                    <textarea id="detail" rows="2" placeholder="相談者様のお悩みや、占いたい内容の詳細を記入してください" required></textarea>

                    <div id="dynamicCardNamesContainer" style="background: #fffcfd; padding: 14px; border-radius: 14px; margin-top: 12px; border: 2px solid #ffd0d6;">
                        <label style="margin-top: 0; color: var(--accent-color);">🃏 出たカードを選択</label>
                        <div id="cardFieldsWrapper"></div>
                    </div>

                    <label>🔮 カードからのメッセージ（総合解釈）</label>
                    <textarea id="meaning" rows="4" placeholder="すべてのカードを総合して読み取った背景や、カード同士のつながり" required></textarea>

                    <label>🐰 悩めるうさぎさんへのアドバイス</label>
                    <textarea id="advice" rows="4" placeholder="相談者様の心に寄り添って紡いだ言葉・具体的な行動提案" required></textarea>

                    <button type="submit">この内容をノートに保存する 🍓</button>
                </form>
            </div>
        </div>

        <div>
            <div class="card-box">
                <h2>📖 タロットキーワード辞典</h2>
                <p style="font-size: 13px; color: #a38a8e; margin-top: -5px;">大アルカナから小アルカナまで78枚網羅！占う時のヒントにしてくださいね 🐰</p>
                
                <label>カードを選択 🍓</label>
                <select id="dicSelect" onchange="showCardInfo()">
                    </select>
                <div id="dicResult" class="dic-output">
                    カードを選択すると、正位置のコアなキーワードとうさぎのリーディング解説がここに表示されます。
                </div>
            </div>
            <div class="bunny-separator">🍓 🐰 🍓 🐰 🍓</div>
        </div>
    </div>

    <div class="card-box">
        <h2>🔍 過去のリーディング履歴を検索 🔮</h2>
        <div style="display: flex; gap: 15px; margin-bottom: 20px;">
            <div style="flex: 2;">

            </div>
            <div style="flex: 1;">
                <select id="filterGenre" onchange="displayLogs()">

                    <option value="恋愛">恋愛</option>
                    <option value="人間関係">人間関係</option>
                    <option value="人生">人生</option>
                </select>
            </div>
        </div>
        <div id="logsContainer"></div>
    </div>
</div>

                    </div>
                    <div class="log-grid">
                        <div class="log-label">🐰【相談内容】</div><div>${log.detail}</div>
                        <div class="log-label">🃏【展開カード】</div>
                        <div>
                            <ul class="history-card-list">${cardsListHtml}</ul>
                        </div>
                        <div class="log-label">📝【カードの解釈】</div><div style="font-style:italic; color:#7d666a;">${log.meaning}</div>
                        <div class="log-label">💬【伝えたアドバイス】</div><div style="font-weight:bold; color:#ff5d7d;">${log.advice}</div>
                    </div>
                `;
                container.appendChild(div);
            }
        });

        if (container.innerHTML === "") {
            container.innerHTML = "<p style='color:#999; text-align:center;'>該当するリーディング記録が見つかりません。🐰</p>";
        }
    }

    // 個別削除を実効する新しい関数
    function deleteLog(id) {
        if (!id) return;
        
        // 念のための確認ウインドウを表示
        const confirmDelete = confirm("この占いの記録をノートから削除しても大丈夫？🐰");
        if (confirmDelete) {
            // 指定されたid以外のログを残すことで削除
            myLogs = myLogs.filter(log => log.id !== id);
            localStorage.setItem('tarot_logs_rabbit_positions_v1', JSON.stringify(myLogs));
            displayLogs(); // 履歴をリフレッシュ
        }
    }

    document.getElementById('logForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const nameInputs = document.querySelectorAll('.card-name-input');
        const cardNamesData = [];
        nameInputs.forEach(select => {
            if(select.value !== "") {
                const pos = select.getAttribute('data-position');
                cardNamesData.push(`${pos} ： ${select.value}`);
            }
        });
        
        const newLog = {
            id: Date.now(), // 新規登録時に一意のID（タイムスタンプ）を付与
            date: document.getElementById('date').value,
            genre: document.getElementById('genre').value,
            spread: document.getElementById('spread').value,
            detail: document.getElementById('detail').value,
            cardNames: cardNamesData,
            meaning: document.getElementById('meaning').value,
            advice: document.getElementById('advice').value
        };

        myLogs.push(newLog);
        localStorage.setItem('tarot_logs_rabbit_positions_v1', JSON.stringify(myLogs));

        displayLogs();
        
        document.getElementById('detail').value = "";
        document.getElementById('meaning').value = "";
        document.getElementById('advice').value = "";
        updateCardInputs();
        
        alert("占い記録をノートに保存したよ！🐰🍓");
    });
</script>
</body>
</html>
